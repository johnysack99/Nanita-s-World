<h1>Become a Fan now!</h1>
          <h3> Wanna join millions of people around the world? Nanita has the biggest fanclub in the world, most recent surveys show 43 million fan. Submit your name below and become a fan today! Join US, 
            Become a Fan. </h3>
          <input type="text" id="name-box"> <button id="join-button">join now</button>
          <h4 id="welcome-message"></h4>
          <script>
            let myButton = document.querySelector('#join-button')
            let myInput = document.querySelector('#name-box')
            let myMessage = document.querySelector('#welcome-message')
            myButton.addEventListener('click', function(){
    

              myMessage.innerHTML = "Welcome to the club!, " + myInput.value
              myInput.value = "";

            });
            myInput.addEventListener('keypress', function(event){
              if (event.key === 'Enter'){
                myMessage.innerHTML = "Welcome to the club!, " + myInput.value;
                myInput.value = "";
              }
            });
          </script>
